services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: pokemon-backend-api:prod
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    # Solo para pruebas locales cuando necesitas abrir puerto en la máquina:
    # ports:
    #   - "3000:3000"
